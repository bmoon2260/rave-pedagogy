<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Rave Pedagogy Framework</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  background-image: url("assets/flyer-background.png");
  background-size: contain;
  background-position: top center;
  background-repeat: no-repeat;
  background-color: #f4f1ee;
  font-family: Arial, Helvetica, sans-serif;
}

.framework-image {
  width: min(54vw, 560px);
  height: auto;
  display: block;
  margin: 300px auto 0 auto;
  opacity: 0;
  transition: opacity 2s ease;
}

.framework-image.visible {
  opacity: 1;
}

#enterButton {
  position: fixed;
  left: 50%;
  bottom: 45px;
  transform: translateX(-50%);
  padding: 16px 32px;
  background: #000;
  color: #fff;
  border: none;
  cursor: pointer;
  font-size: 20px;
  font-weight: bold;
  letter-spacing: 2px;
  z-index: 100;
}

#enterButton:hover {
  background: #333;
}
</style>
</head>

<body>

<audio id="music" loop>
  <source src="assets/lock_up_loop.mp3" type="audio/mpeg">
</audio>

<img
  class="framework-image"
  src="assets/Rave_Pedagogy_Framework_Static.svg"
  alt="Rave Pedagogy Framework">

<button id="enterButton">
  ▶ ENTER THE TALZ
</button>

<script>
const button = document.getElementById("enterButton");
const music = document.getElementById("music");
const framework = document.querySelector(".framework-image");

button.addEventListener("click", () => {
  framework.classList.add("visible");

  music.volume = 0;
  music.play();

  let volume = 0;
  const fadeIn = setInterval(() => {
    if (volume < 0.7) {
      volume += 0.05;
      music.volume = volume;
    } else {
      clearInterval(fadeIn);
    }
  }, 250);

  button.style.opacity = "0";
  button.style.transition = "opacity 1s ease";

  setTimeout(() => {
    button.style.display = "none";
  }, 1000);
});
</script>

</body>
</html>
