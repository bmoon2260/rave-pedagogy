<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Rave Pedagogy Framework</title>
<style>
  body {
    margin: 0;
    background: #fff;
    font-family: Arial, Helvetica, sans-serif;
  }

  svg {
    width: 100vw;
    height: 100vh;
  }

  text {
    fill: #000;
    text-anchor: middle;
  }

  .title {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 1px;
  }

  .principle {
    font-size: 20px;
    font-weight: 700;
    text-transform: uppercase;
  }

  .small {
    font-size: 13px;
  }

  .center-circle {
    fill: none;
    stroke: #000;
    stroke-width: 3;
    animation: breathe 4s ease-in-out infinite;
    transform-origin: 500px 380px;
  }

  .outer-circle {
    fill: none;
    stroke: #000;
    stroke-width: 2;
    stroke-dasharray: 6 8;
  }

  .dot {
    fill: #000;
    animation: dance 2.5s ease-in-out infinite alternate;
  }

  .dot:nth-of-type(odd) {
    animation-duration: 2.1s;
  }

  .dot:nth-of-type(even) {
    animation-duration: 3.2s;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.025); }
  }

  @keyframes dance {
    0% { transform: translate(0, 0); }
    100% { transform: translate(5px, -4px); }
  }
</style>
</head>

<body>

<img 
  class="framework-image"
  src="assets/Rave_Pedagogy_Framework_Static.svg"
  alt="Static Rave Pedagogy framework"
/>

</body>
</html>
