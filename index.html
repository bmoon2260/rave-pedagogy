<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Rave Pedagogy Framework</title>

<style>
body {
  margin: 0;
  background: #f4f1ee;
  font-family: Arial, Helvetica, sans-serif;
  overflow: hidden;
}

.stage {
  position: relative;
  width: 100vw;
  height: 100vh;
}

.flyer-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.framework-image {
  position: absolute;
  left: 50%;
  top: 53%;
  transform: translate(-50%, -50%);
  width: min(42vw, 500px);
  opacity: 0;
  transition: opacity 2s ease;
  z-index: 2;
}

.framework-image.visible {
  opacity: 1;
}

#enterButton {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  padding: 22px 44px;
  background: #000;
  color: #fff;
  border: 3px solid #fff;
  cursor: pointer;
  font-size: 34px;
  font-weight: bold;
  letter-spacing: 3px;
  z-index: 3;
}

#enterButton:hover {
  background: #333;
}
</style>
</head>

<body>

<audio id="music" loop>
  <source src="assets/lock_up_loop.mp3" type="audio/mpeg">
</audio>

<div class="stage">
  <img class="flyer-bg" src="assets/flyer-background.png" alt="Rave flyer background">

  <img
    class="framework-image"
    src="assets/Rave_Pedagogy_Framework_Static.svg"
    alt="Rave Pedagogy Framework">

  <button id="enterButton">ENTER THE TALZ</button>
</div>

<script>
const button = document.getElementById("enterButton");
const music = document.getElementById("music");
const framework = document.querySelector(".framework-image");

button.addEventListener("click", () => {
  framework.classList.add("visible");

  music.volume = 0;
  music.play();

  let volume = 0;
  const fadeIn = setInterval(() => {
    if (volume < 0.7) {
      volume += 0.05;
      music.volume = volume;
    } else {
      clearInterval(fadeIn);
    }
  }, 250);

  button.style.opacity = "0";
  button.style.transition = "opacity 1s ease";

  setTimeout(() => {
    button.style.display = "none";
  }, 1000);
});
</script>

</body>
</html>
